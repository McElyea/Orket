name: External Extension CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate extension manifest and entrypoints
        run: |
          python -m orket_extension_sdk.validate . --json

      - name: Enforce import isolation
        run: |
          python -m orket_extension_sdk.import_scan src --json

      - name: Validate via host CLI
        run: |
          orket ext validate . --json

      - name: Run tests
        run: |
          python -m pytest -q tests/
