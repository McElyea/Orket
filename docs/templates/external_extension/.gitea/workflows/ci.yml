name: External Extension CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    env:
      ORKET_SDK_INSTALL_SPEC: ${{ vars.ORKET_SDK_INSTALL_SPEC }}
      ORKET_HOST_INSTALL_SPEC: ${{ vars.ORKET_HOST_INSTALL_SPEC }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bootstrap extension environment
        run: |
          ./scripts/install.sh

      - name: Validate and test
        run: |
          ./scripts/validate.sh

      - name: Build authoritative source distribution
        run: |
          ./scripts/build-release.sh

      - name: Verify authoritative source distribution
        run: |
          ./scripts/verify-release.sh
