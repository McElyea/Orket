name: Quant Sweep Nightly

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      matrix_config:
        description: "Matrix config path"
        required: false
        default: "benchmarks/configs/quant_sweep_common_sessions.json"
      task_limit:
        description: "Optional task limit for hosted smoke"
        required: false
        default: "1"

jobs:
  hosted-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate Quant Sweep Dry Run Plan
        run: |
          mkdir -p benchmarks/results/quant/quant_sweep
          python scripts/quant/run_quant_sweep.py \
            --model-id placeholder-model \
            --quant-tags Q8_0 \
            --matrix-config "${{ github.event.inputs.matrix_config || 'benchmarks/configs/quant_sweep_common_sessions.json' }}" \
            --task-limit "${{ github.event.inputs.task_limit || '1' }}" \
            --dry-run > benchmarks/results/quant/quant_sweep/nightly_dry_run_plan.json

      - name: Validate Quant Sweep Dry Run Plan
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("benchmarks/results/quant/quant_sweep/nightly_dry_run_plan.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          if not isinstance(payload, dict) or "dry_run" not in payload:
              raise SystemExit("nightly quant dry-run plan is missing the expected 'dry_run' payload")
          PY

      - name: Upload Quant Sweep Dry Run Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quant-sweep-nightly-dry-run-artifacts
          path: |
            benchmarks/results/quant/quant_sweep/nightly_dry_run_plan.json
