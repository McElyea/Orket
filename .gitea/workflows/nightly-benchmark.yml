name: Nightly Benchmark

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Phase 5 Benchmark Suite
        run: >
          python scripts/benchmarks/run_benchmark_suite.py
          --task-bank benchmarks/task_bank/v1/tasks.json
          --policy model/core/contracts/benchmark_scoring_policy.json
          --runs 2
          --venue standard
          --flow default
          --runner-template "python scripts/benchmarks/orchestration_runner.py --task {task_file} --venue {venue} --flow {flow} --run-dir {run_dir}"
          --task-id-min 61
          --task-id-max 100
          --raw-out benchmarks/results/benchmarks/nightly_phase5_determinism_report.json
          --scored-out benchmarks/results/benchmarks/nightly_phase5_scored_report.json

      - name: Smoke: Memory Trace Fixture Contract And Comparator Identity Check
        run: |
          python scripts/ci/memory_fixture_smoke.py --profile nightly --out-dir benchmarks/results/benchmarks/memory
          python scripts/benchmarks/check_memory_determinism.py \
            --trace benchmarks/results/benchmarks/memory/memory_trace_fixture_left.json \
            --retrieval-trace benchmarks/results/benchmarks/memory/memory_retrieval_trace_fixture_left.json \
            --out benchmarks/results/benchmarks/nightly_memory_determinism_check.json
          python scripts/benchmarks/compare_memory_determinism.py \
            --left benchmarks/results/benchmarks/memory/memory_trace_fixture_left.json \
            --right benchmarks/results/benchmarks/memory/memory_trace_fixture_right.json \
            --left-retrieval benchmarks/results/benchmarks/memory/memory_retrieval_trace_fixture_left.json \
            --right-retrieval benchmarks/results/benchmarks/memory/memory_retrieval_trace_fixture_right.json \
            --out benchmarks/results/benchmarks/nightly_memory_determinism_compare.json

      - name: Enforce ODR determinism gate (nightly tier)
        env:
          ODR_GATE_NIGHTLY: "1"
          ODR_PERMUTATIONS: "50"
          ODR_REPEATS: "20"
        run: |
          python -m pytest -q tests/kernel/v1/test_odr_determinism_gate.py -k gate_nightly

      - name: Build Trend Report
        run: >
          python scripts/benchmarks/report_benchmark_trends.py
          --input-glob "benchmarks/results/benchmarks/nightly_phase5_scored*.json"
          --out benchmarks/results/benchmarks/nightly_benchmark_trends.json

      - name: Build Leaderboard
        run: >
          python scripts/benchmarks/build_benchmark_leaderboard.py
          --inputs benchmarks/results/benchmarks/nightly_phase5_scored_report.json
          --out benchmarks/results/benchmarks/nightly_benchmark_leaderboard.json

      - name: Render Dashboard
        run: >
          python scripts/benchmarks/render_benchmark_dashboard.py
          --trends benchmarks/results/benchmarks/nightly_benchmark_trends.json
          --leaderboard benchmarks/results/benchmarks/nightly_benchmark_leaderboard.json
          --out benchmarks/results/benchmarks/nightly_benchmark_dashboard.md

      - name: Upload Benchmark Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-artifacts
          path: |
            benchmarks/results/benchmarks/nightly_*.json
            benchmarks/results/benchmarks/nightly_*.md
